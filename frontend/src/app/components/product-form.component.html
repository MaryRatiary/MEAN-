<div class="container">
  <h1>{{ isEditMode ? 'Modifier le Produit' : 'Ajouter un Nouveau Produit' }}</h1>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div *ngIf="success" class="alert alert-success">
    {{ success }}
  </div>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="form-container">
    <div class="form-group">
      <label for="name">Nom du Produit</label>
      <input 
        type="text" 
        id="name" 
        formControlName="name" 
        class="form-control"
        placeholder="Entrez le nom du produit">
      <small class="form-error" *ngIf="productForm.get('name')?.invalid && productForm.get('name')?.touched">
        Le nom doit contenir au moins 3 caractères
      </small>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea 
        id="description" 
        formControlName="description" 
        class="form-control"
        rows="4"
        placeholder="Entrez la description du produit"></textarea>
      <small class="form-error" *ngIf="productForm.get('description')?.invalid && productForm.get('description')?.touched">
        La description doit contenir au moins 10 caractères
      </small>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="price">Prix</label>
        <input 
          type="number" 
          id="price" 
          formControlName="price" 
          class="form-control"
          placeholder="0.00">
        <small class="form-error" *ngIf="productForm.get('price')?.invalid && productForm.get('price')?.touched">
          Le prix doit être supérieur à 0
        </small>
      </div>

      <div class="form-group">
        <label for="quantity">Quantité</label>
        <input 
          type="number" 
          id="quantity" 
          formControlName="quantity" 
          class="form-control"
          placeholder="0">
        <small class="form-error" *ngIf="productForm.get('quantity')?.invalid && productForm.get('quantity')?.touched">
          La quantité doit être supérieure à 0
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Catégorie</label>
        <select id="category" formControlName="category" class="form-control">
          <option value="">Sélectionnez une catégorie</option>
          <option value="Électronique">Électronique</option>
          <option value="Vêtements">Vêtements</option>
          <option value="Livres">Livres</option>
          <option value="Maison">Maison</option>
          <option value="Sports">Sports</option>
          <option value="Autre">Autre</option>
        </select>
        <small class="form-error" *ngIf="productForm.get('category')?.invalid && productForm.get('category')?.touched">
          Veuillez sélectionner une catégorie
        </small>
      </div>

      <div class="form-group">
        <label for="rating">Note (0-5)</label>
        <input 
          type="number" 
          id="rating" 
          formControlName="rating" 
          class="form-control"
          min="0"
          max="5"
          placeholder="0">
      </div>
    </div>

    <div class="form-group">
      <label for="image">URL de l'Image</label>
      <input 
        type="text" 
        id="image" 
        formControlName="image" 
        class="form-control"
        placeholder="https://example.com/image.jpg">
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-success" [disabled]="loading || productForm.invalid">
        {{ loading ? 'Enregistrement...' : (isEditMode ? 'Mettre à jour' : 'Créer') }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">
        Annuler
      </button>
    </div>
  </form>
</div>
