<section class="container mt-4">
  <h2>Shopping Cart</h2>

  <div *ngIf="cartItems.length === 0" class="text-center mt-4 mb-4">
    <p>Your cart is empty.</p>
    <a routerLink="/products" class="btn btn-black">Go Shopping</a>
  </div>

  <div *ngIf="cartItems.length > 0" class="grid grid-cols-3 gap-2">
    <div class="col-span-2" style="grid-column: span 2;">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of cartItems">
            <td class="flex items-center">
              <img [src]="item.image" style="width: 50px; height: 50px; object-fit: contain; margin-right: 1rem; border: var(--border-light);">
              <a [routerLink]="['/products', item.product]">{{ item.name }}</a>
            </td>
            <td>{{ item.price | currency:'EUR' }}</td>
            <td>
              <input type="number" [value]="item.qty" (change)="updateQty(item.product, $any($event.target).value)" style="width: 60px; margin-bottom: 0;">
            </td>
            <td>{{ item.price * item.qty | currency:'EUR' }}</td>
            <td class="text-right">
              <button (click)="removeItem(item.product)" style="background: none; border: none; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; font-weight: 700;">Remove</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="summary-card card" style="height: fit-content;">
      <h3 style="margin-top: 0;">Order Summary</h3>
      <div class="flex justify-between items-center mb-20">
        <span>Subtotal</span>
        <span style="font-weight: 700;">{{ totalPrice | currency:'EUR' }}</span>
      </div>
      <div class="flex justify-between items-center mb-4">
        <span>Shipping</span>
        <span style="font-weight: 700;">Free</span>
      </div>
      <div style="border-top: var(--border); padding-top: 1rem; margin-top: 1rem;">
        <div class="flex justify-between items-center mb-4">
          <span style="font-weight: 700; text-transform: uppercase;">Total</span>
          <span style="font-weight: 900; font-size: 1.5rem;">{{ totalPrice | currency:'EUR' }}</span>
        </div>
        <button class="btn btn-black btn-block" (click)="toCheckout()">Checkout</button>
      </div>
    </div>
  </div>
</section>
