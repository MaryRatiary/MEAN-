    <nav class="flex items-center space-x-6 text-[11px] font-normal tracking-tight text-black/80">
      <a routerLink="/" class="hover:text-black transition-colors">Store</a>
      <a routerLink="/products" class="hover:text-black transition-colors">iPhone</a>
      <a routerLink="/products" class="hover:text-black transition-colors">Mac</a>
      <a routerLink="/products" class="hover:text-black transition-colors">Watch</a>
      <a routerLink="/products" class="hover:text-black transition-colors">Support</a>
      <a routerLink="/cart" class="hover:text-black transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
      </a>
      <ng-container *ngIf="isLoggedIn()">
        <a *ngIf="isAdmin()" routerLink="/admin" class="hover:text-black transition-colors">Admin</a>
        <a (click)="logout()" class="hover:text-black transition-colors cursor-pointer">Logout</a>
      </ng-container>
      <ng-container *ngIf="!isLoggedIn()">
        <a routerLink="/login" class="hover:text-black transition-colors">Login</a>
      </ng-container>
    </nav>
  </div>
</header>
