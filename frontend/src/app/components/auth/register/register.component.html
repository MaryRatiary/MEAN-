<section class="container" style="max-width: 400px; margin: 4rem auto;">
  <h2 class="text-center">Register</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" formControlName="name" placeholder="John Doe">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" placeholder="john@example.com">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" formControlName="password" placeholder="******">
    </div>
    <button type="submit" class="btn btn-black btn-block" [disabled]="registerForm.invalid">Sign Up</button>
  </form>
  <div class="text-center mt-20">
    <p style="font-size: 0.75rem;">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</section>
