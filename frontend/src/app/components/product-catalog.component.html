<section class="max-w-[1200px] mx-auto px-4 pt-24 pb-24">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 space-y-4 md:space-y-0">
    <h2 class="text-4xl md:text-5xl font-semibold tracking-tight text-black">Parcourir les produits.</h2>
    <div class="flex items-center space-x-4">
      <span class="text-[10px] font-bold text-black/40 uppercase tracking-[0.2em]">Filtrer</span>
      <select (change)="onCategoryChange($event)" class="bg-transparent border-none text-sm font-medium focus:ring-0 cursor-pointer text-black/80 hover:text-black transition-colors">
        <option value="">Toutes les catégories</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <div *ngFor="let product of filteredProducts" 
         class="group bg-white rounded-[28px] p-6 transition-all duration-500 hover:shadow-[0_20px_50px_rgba(0,0,0,0.05)] hover:-translate-y-1 border border-black/5 flex flex-col">
      <div class="aspect-square w-full mb-8 flex items-center justify-center overflow-hidden rounded-2xl bg-[#fafafa]">
        <img *ngIf="product.image" [src]="product.image" [alt]="product.name" 
             class="max-h-[85%] max-w-[85%] object-contain transition-transform duration-1000 ease-out group-hover:scale-110">
        <span *ngIf="!product.image" class="text-[10px] font-bold text-black/20 uppercase tracking-widest">Aucune image</span>
      </div>
      <div class="flex flex-col flex-grow">
        <div class="flex flex-col mb-4">
          <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest mb-1">Nouveau</span>
          <h4 class="text-xl font-semibold tracking-tight text-black/90 group-hover:text-black transition-colors leading-tight mb-1">{{ product.name }}</h4>
          <p class="text-sm font-medium text-black/50">{{ product.price | currency:'EUR' }}</p>
        </div>
        
        <div class="mt-auto flex items-center justify-between pt-4 opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-y-2 group-hover:translate-y-0">
          <a [routerLink]="['/products', product._id]" class="text-blue-600 font-medium text-sm hover:underline">Découvrir</a>
          <button class="bg-black text-white text-[10px] font-bold uppercase tracking-widest px-5 py-2.5 rounded-full hover:bg-black/80 transition-colors">Acheter</button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="filteredProducts.length === 0" class="flex flex-col items-center justify-center py-32 bg-[#fafafa] rounded-[40px] mt-12">
    <p class="text-2xl text-black/40 font-medium mb-8">Aucun produit trouvé ici.</p>
    <button class="bg-black text-white px-10 py-4 rounded-full font-medium transition-all hover:scale-105 active:scale-95" (click)="resetFilter()">Tout afficher</button>
  </div>
</section>
