<section class="container mt-4">
  <div class="flex justify-between items-center mb-4">
    <h2>All Products</h2>
    <div class="flex items-center">
      <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; margin-right: 1rem;">Filter by:</span>
      <select (change)="onCategoryChange($event)" style="margin-bottom: 0; width: auto; font-size: 0.75rem; text-transform: uppercase;">
        <option value="">All Categories</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>
  </div>

  <div class="grid grid-cols-4">
    <div *ngFor="let product of filteredProducts" class="card">
      <div style="background: var(--gray-50); height: 300px; margin-bottom: 1.5rem; display: flex; items-center; justify-content: center; border: var(--border-light);">
        <img *ngIf="product.image" [src]="product.image" [alt]="product.name" style="max-height: 100%; max-width: 100%; object-fit: contain;">
        <span *ngIf="!product.image" style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--gray-200);">No Image</span>
      </div>
      <div class="flex justify-between items-start">
        <div>
          <h4 style="margin-bottom: 0.25rem;">{{ product.name }}</h4>
          <span class="badge" style="margin-bottom: 1rem;">{{ product.category }}</span>
        </div>
        <p style="font-size: 1rem; font-weight: 700;">{{ product.price | currency:'EUR' }}</p>
      </div>
      <a [routerLink]="['/products', product._id]" class="btn btn-block">Details</a>
    </div>
  </div>

  <div *ngIf="filteredProducts.length === 0" class="text-center mt-4 mb-4">
    <p>No products found in this category.</p>
    <button class="btn btn-black" (click)="resetFilter()">Show All</button>
  </div>
</section>
