<section class="container mt-4" style="max-width: 600px;">
  <h2>Checkout</h2>
  <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
    <h3 style="margin-top: 2rem;">Shipping Address</h3>
    <div class="form-group">
      <label for="address">Address</label>
      <input type="text" id="address" formControlName="address" placeholder="123 Street Name">
    </div>
    <div class="grid grid-cols-2">
      <div class="form-group">
        <label for="city">City</label>
        <input type="text" id="city" formControlName="city" placeholder="Paris">
      </div>
      <div class="form-group">
        <label for="postalCode">Postal Code</label>
        <input type="text" id="postalCode" formControlName="postalCode" placeholder="75000">
      </div>
    </div>
    <div class="form-group">
      <label for="country">Country</label>
      <input type="text" id="country" formControlName="country" placeholder="France">
    </div>

    <h3 style="margin-top: 2rem;">Total to Pay: {{ totalPrice | currency:'EUR' }}</h3>
    <button type="submit" class="btn btn-black btn-block" [disabled]="checkoutForm.invalid">Place Order</button>
  </form>
</section>
