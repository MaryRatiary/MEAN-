<section class="max-w-[500px] mx-auto pt-24 pb-24 px-6">
  <div class="mb-12">
    <p class="text-[10px] font-bold text-black/40 uppercase tracking-[0.2em] mb-2 px-1">Finaliser l'achat</p>
    <h2 class="text-4xl md:text-5xl font-semibold tracking-tight text-black leading-tight">Paiement.</h2>
  </div>

  <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()" class="space-y-10">
    <div>
      <h3 class="text-xl font-semibold mb-6 tracking-tight">Adresse de livraison</h3>
      <div class="space-y-4">
        <div class="flex flex-col">
          <label for="address" class="text-[10px] font-bold text-black/40 uppercase tracking-widest mb-1.5 px-1">Adresse</label>
          <input type="text" id="address" formControlName="address" placeholder="123 Rue de la Paix"
                 class="bg-white border border-black/10 rounded-2xl px-5 py-4 text-sm focus:ring-1 focus:ring-black/20 focus:border-black transition-all outline-none">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col">
            <label for="city" class="text-[10px] font-bold text-black/40 uppercase tracking-widest mb-1.5 px-1">Ville</label>
            <input type="text" id="city" formControlName="city" placeholder="Paris"
                   class="bg-white border border-black/10 rounded-2xl px-5 py-4 text-sm focus:ring-1 focus:ring-black/20 focus:border-black transition-all outline-none">
          </div>
          <div class="flex flex-col">
            <label for="postalCode" class="text-[10px] font-bold text-black/40 uppercase tracking-widest mb-1.5 px-1">Code Postal</label>
            <input type="text" id="postalCode" formControlName="postalCode" placeholder="75000"
                   class="bg-white border border-black/10 rounded-2xl px-5 py-4 text-sm focus:ring-1 focus:ring-black/20 focus:border-black transition-all outline-none">
          </div>
        </div>
        <div class="flex flex-col">
          <label for="country" class="text-[10px] font-bold text-black/40 uppercase tracking-widest mb-1.5 px-1">Pays</label>
          <input type="text" id="country" formControlName="country" placeholder="France"
                 class="bg-white border border-black/10 rounded-2xl px-5 py-4 text-sm focus:ring-1 focus:ring-black/20 focus:border-black transition-all outline-none">
        </div>
      </div>
    </div>

    <div class="pt-8 border-t border-black/5">
      <div class="flex justify-between items-center mb-10">
        <span class="text-xl font-medium text-black/50">Total à payer</span>
        <span class="text-3xl font-semibold text-black tracking-tight">{{ totalPrice | currency:'EUR' }}</span>
      </div>
      <button type="submit" 
              [disabled]="checkoutForm.invalid"
              class="w-full bg-black text-white py-5 rounded-full font-bold text-sm uppercase tracking-widest hover:bg-black/80 disabled:opacity-20 disabled:cursor-not-allowed transition-all shadow-2xl shadow-black/20 active:scale-95">
        Valider la commande
      </button>
    </div>
  </form>
</section>
