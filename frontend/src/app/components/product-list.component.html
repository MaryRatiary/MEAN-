<div class="px-0">
  <div *ngIf="loading" class="flex items-center justify-center py-8">
    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-black"></div>
  </div>

  <div *ngIf="error" class="bg-red-50 text-red-600 p-4 rounded-2xl mb-4 text-xs font-medium">
    {{ error }}
  </div>

  <div class="space-y-3">
    <div *ngFor="let product of products" class="flex items-center justify-between p-3 bg-[#fafafa] rounded-2xl border border-black/5 hover:bg-white hover:shadow-md transition-all group">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center overflow-hidden border border-black/5 shadow-sm">
          <img *ngIf="product.image" [src]="product.image" [alt]="product.name" class="object-contain w-full h-full">
        </div>
        <div class="flex flex-col">
          <h4 class="text-[13px] font-semibold text-black/80 truncate max-w-[120px]">{{ product.name }}</h4>
          <span class="text-[9px] font-bold text-black/30 uppercase tracking-widest">{{ product.category }}</span>
        </div>
      </div>
      
      <div class="flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
        <button class="p-1.5 text-black/30 hover:text-blue-600 transition-colors" [routerLink]="['/edit', product._id]">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        </button>
        <button class="p-1.5 text-black/30 hover:text-red-500 transition-colors" (click)="deleteProduct(product._id)">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="products.length === 0 && !loading" class="text-center py-8">
    <p class="text-xs text-black/30 font-medium">Aucun produit disponible.</p>
  </div>
</div>
