<section class="hero text-center" style="padding: 8rem 0; border-bottom: var(--border);">
  <div class="container">
    <h1 style="font-size: 4rem; margin-bottom: 2rem;">Minimalist. MEAN.</h1>
    <p style="max-width: 600px; margin: 0 auto 3rem; font-size: 1.25rem; font-weight: 300;">
      A monochromatic exploration of the MEAN stack. Pure design, robust logic.
    </p>
    <a routerLink="/products" class="btn btn-black btn-block" style="max-width: 300px; margin: 0 auto;">Explore Collection</a>
  </div>
</section>

<section class="featured-products mt-4">
  <div class="container">
    <div class="flex justify-between items-center mb-4">
      <h3>Featured Selection</h3>
      <a routerLink="/products" class="nav-link" style="margin-left: 0;">View All</a>
    </div>
    <div class="grid grid-cols-4">
      <div *ngFor="let product of featuredProducts" class="card">
        <div style="background: var(--gray-50); height: 300px; margin-bottom: 1.5rem; display: flex; items-center; justify-content: center; border: var(--border-light);">
          <img *ngIf="product.image" [src]="product.image" [alt]="product.name" style="max-height: 100%; max-width: 100%; object-fit: contain;">
          <span *ngIf="!product.image" style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--gray-200);">No Image</span>
        </div>
        <h4>{{ product.name }}</h4>
        <p style="font-size: 1rem; font-weight: 700;">{{ product.price | currency:'EUR' }}</p>
        <a [routerLink]="['/products', product._id]" class="btn btn-block">View Details</a>
      </div>
    </div>
  </div>
</section>
